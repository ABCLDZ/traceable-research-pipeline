name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Open-source audit
        run: python scripts/check_open_source.py
      - name: Manifest freshness
        run: python scripts/build_project_manifest.py --check
      - name: Test
        run: python -m pytest
      - name: Compile
        run: python -m compileall -q src scripts tests skills

  package:
    name: Package and offline workflow
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build distributions
        run: python -m build
      - name: Validate packaged prompt
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              target = "research_pipeline/resources/extract_evidence_v3.md"
              assert target in archive.namelist()
              assert "[S0001]" in archive.read(target).decode("utf-8")
          print(f"PASS: {wheel.name} contains the production prompt")
          PY
      - name: Install wheel into a clean environment
        run: |
          python -m venv /tmp/research-flow-release
          /tmp/research-flow-release/bin/python -m pip install --upgrade pip
          /tmp/research-flow-release/bin/python -m pip install dist/*.whl
      - name: Smoke test installed wheel outside the repository
        run: |
          mkdir -p /tmp/research-flow-smoke
          cd /tmp/research-flow-smoke
          /tmp/research-flow-release/bin/research-flow --help
          /tmp/research-flow-release/bin/python - <<'PY'
          from research_pipeline.extractor import load_prompt

          prompt = load_prompt()
          assert "# Extract Evidence Cards V3" in prompt
          assert "[S0001]" in prompt
          print("PASS: installed wheel can load its production prompt")
          PY
          /tmp/research-flow-release/bin/python \
            "$GITHUB_WORKSPACE/scripts/offline_demo.py" demo
          /tmp/research-flow-release/bin/research-flow \
            verify-release demo/release-v1
